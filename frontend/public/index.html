<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e40af" />
    <meta
      name="description"
      content="InfraDigital - Plataforma integral de gestión empresarial para micro, pequeñas y medianas empresas colombianas. Inventario, facturación, CRM y analíticas."
    />
    <meta name="author" content="InfraDigital" />
    <meta name="keywords" content="gestión empresarial, MiPyMEs, Colombia, inventario, facturación, CRM, analíticas" />

    <!-- Open Graph / Redes Sociales -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="InfraDigital - Gestión Empresarial" />
    <meta property="og:description" content="Plataforma integral de gestión empresarial para MiPyMEs colombianas" />
    <meta property="og:url" content="https://infradigital.app" />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>InfraDigital - Gestión Empresarial</title>

    <style>
      /* Estilos base y pantalla de carga */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f0f4f8;
        color: #1e293b;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #1e40af 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #loading-screen .logo-text {
        font-size: 2.5rem;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      #loading-screen .logo-subtitle {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 2rem;
      }

      #loading-screen .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Indicador offline */
      #offline-indicator {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background-color: #f59e0b;
        color: #78350f;
        text-align: center;
        padding: 6px 16px;
        font-size: 0.85rem;
        font-weight: 500;
        z-index: 10000;
      }

      #offline-indicator.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>

    <!-- Indicador de modo sin conexión -->
    <div id="offline-indicator">
      Sin conexión a internet — Los cambios se sincronizarán automáticamente al reconectarse.
    </div>

    <!-- Pantalla de carga inicial -->
    <div id="loading-screen">
      <div class="logo-text">InfraDigital</div>
      <div class="logo-subtitle">Gestión Empresarial Inteligente</div>
      <div class="spinner"></div>
    </div>

    <!-- Contenedor principal de React -->
    <div id="root"></div>

    <script>
      // Detectar estado de conexión
      function updateOnlineStatus() {
        var indicator = document.getElementById('offline-indicator');
        if (indicator) {
          if (!navigator.onLine) {
            indicator.classList.add('visible');
          } else {
            indicator.classList.remove('visible');
          }
        }
      }
      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      updateOnlineStatus();

      // Ocultar pantalla de carga cuando React monte
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
